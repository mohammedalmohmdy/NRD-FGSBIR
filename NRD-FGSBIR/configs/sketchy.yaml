# Configuration for Sketchy Extended Dataset
# Inherits from default.yaml and overrides dataset-specific settings

defaults:
  - default

# Dataset-specific settings
training:
  dataset: "sketchy_extended"
  data_root: "./data/sketchy_extended"
  batch_size: 64
  num_epochs: 100
  
  # Sketchy Extended specific loss weights
  loss_weights:
    triplet_ranking: 1.0
    trajectory_alignment: 0.5
    smoothness: 0.1
    l2_regularization: 0.001

# Sketchy Extended specific augmentation
augmentation:
  train:
    resize: 256
    crop_size: 224
    horizontal_flip: 0.5
    rotation: 15
