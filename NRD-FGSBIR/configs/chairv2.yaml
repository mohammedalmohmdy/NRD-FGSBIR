# Configuration for ChairV2 Dataset
# Inherits from default.yaml and overrides dataset-specific settings

defaults:
  - default

# Dataset-specific settings
training:
  dataset: "chairv2"
  data_root: "./data/chairv2"
  batch_size: 32
  num_epochs: 80
  
  # ChairV2 specific loss weights
  loss_weights:
    triplet_ranking: 1.0
    trajectory_alignment: 0.6
    smoothness: 0.15
    l2_regularization: 0.001

# ChairV2 specific augmentation
augmentation:
  train:
    resize: 256
    crop_size: 224
    horizontal_flip: 0.5
    rotation: 10
